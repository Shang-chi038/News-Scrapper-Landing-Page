<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News Scrapper - Know your world rule world</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="stylesheet.css">
</head>

<body>
    <main class="container">
        <!-- Left: Headline + Auth -->
        <section class="auth-column">
            <h1 class="headline">Know your world rule world</h1>

            <div class="auth-stack">
                <!-- Continue with Google -->
                <a href="#" class="pill-btn" aria-label="Continue with Google">
                    <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
                        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                    </svg>
                    Continue with Google
                </a>

                <!-- Continue with Apple -->
                <a href="#" class="pill-btn" aria-label="Continue with Apple">
                    <svg viewBox="0 0 24 24" fill="#000000" xmlns="http://www.w3.org/2000/svg">
                        <path d="M17.05 12.04c-.03-3.16 2.58-4.68 2.7-4.75-1.47-2.15-3.76-2.44-4.57-2.47-1.94-.2-3.79 1.14-4.78 1.14-.98 0-2.5-1.12-4.11-1.09-2.11.03-4.06 1.23-5.15 3.12-2.2 3.81-.56 9.45 1.58 12.54 1.05 1.51 2.3 3.21 3.92 3.15 1.57-.06 2.17-1.02 4.07-1.02 1.9 0 2.44 1.02 4.11.99 1.7-.03 2.77-1.54 3.81-3.06 1.2-1.75 1.69-3.45 1.72-3.53-.04-.02-3.3-1.27-3.33-5.04zM14.13 3.83c.87-1.05 1.46-2.51 1.3-3.97-1.25.05-2.77.83-3.67 1.88-.81.93-1.51 2.42-1.32 3.85 1.39.11 2.81-.71 3.69-1.76z"/>
                    </svg>
                    Continue with Apple
                </a>

                <!-- Continue with phone -->
                <a href="#" class="pill-btn" aria-label="Continue with phone">
                    <svg viewBox="0 0 24 24" fill="none" stroke="#000000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
                        <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
                    </svg>
                    Continue with phone
                </a>
            </div>

            <!-- OR divider -->
            <div class="divider">or</div>

            <!-- Email input -->
            <div class="input-group">
                <input type="text" id="email" class="email-input" placeholder=" " aria-label="Email or username" autocomplete="off">
                <label for="email">Email or username</label>
            </div>
            
            <br>

            <!-- Continue button -->
            <button class="continue-btn" id="continueBtn" disabled>Continue</button>

            <!-- Fine print -->
            <p class="fine-print">
                By continuing, you agree to our <a href="#">Terms of Service</a>,
                <a href="#">Privacy Policy</a> and Cookie Use.
            </p>
        </section>

        <!-- Right: NS Logo -->
        <section class="logo-column">
            <!-- Replace src with your real transparent PNG, e.g. "assets/ns-logo.png" -->
            <img src="ns_logo.png" alt="News Scrapper NS monogram logo" class="ns-logo"
                 onerror="this.style.opacity=0.15; this.alt='NS logo placeholder — drop your file at assets/ns-logo.png';">
        </section>
    </main>

    <!-- Footer (carried over from v1, restyled for dark theme) -->
    <footer>
        <div class="footer-container">
            <div class="footer-left">
                <div class="footer-icons">
                    <a href="#" class="footer-icon" title="Instagram" aria-label="Instagram">
                        <i class="fa-brands fa-instagram"></i>
                    </a>
                    <a href="#" class="footer-icon" title="X (Twitter)" aria-label="X (Twitter)">
                        <i class="fa-brands fa-x-twitter"></i>
                    </a>
                    <a href="#" class="footer-icon" title="TikTok" aria-label="TikTok">
                        <i class="fa-brands fa-tiktok"></i>
                    </a>
                    <a href="#" class="footer-icon" title="Email" aria-label="Email">
                        <i class="fa-solid fa-envelope"></i>
                    </a>
                    <a href="#" class="footer-icon" title="Telephone" aria-label="Telephone">
                        <i class="fa-solid fa-phone"></i>
                    </a>
                </div>
            </div>
            <div class="footer-right">
                <a href="#">About Us</a>
                <span class="footer-separator">|</span>
                <a href="#">Terms of Service</a>
                <span class="footer-separator">|</span>
                <a href="#">Privacy Policy</a>
                <span class="footer-separator">|</span>
                <a href="#">Guidelines</a>
                <span class="footer-separator">|</span>
                <a href="#">Contact Us</a><br>
                <span class="footer-separator">|</span>
                <span>&copy; 2026 News Scrapper Ltd.</span>
            </div>
        </div>
    </footer>

    <script>
        // Enable the Continue button only when the input has text
        const emailInput = document.getElementById('email');
        const continueBtn = document.getElementById('continueBtn');

        emailInput.addEventListener('input', () => {
            if (emailInput.value.trim().length > 0) {
                continueBtn.classList.add('active');
                continueBtn.removeAttribute('disabled');
            } else {
                continueBtn.classList.remove('active');
                continueBtn.setAttribute('disabled', '');
            }
        });
    </script>
</body>
</html>
